env:
  DESTINATION_USERNAME: 'dennisvtang'
  DESTINATION_REPOSITORY: 'youtube-api-data-transfer'
  COMMIT_EMAIL: 'dennisvtang@gmail.com'
  SOURCE_FILES: |
    .github/workflows/ci.yml
    configs/

on:
  # allows manual trigger
  workflow_dispatch:
  push:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Push github action and configs
      id: push-linter-and-configs
      uses: dennisvtang/copy_file_to_another_repo_action@main
      env:
        API_TOKEN_GITHUB: ${{ secrets.REPO_TOKEN }}
      with:
        user_name: ${{ env.DESTINATION_USERNAME }}
        user_email: ${{ env.COMMIT_EMAIL }}
        destination_repo: ${{ env.DESTINATION_USERNAME }}/${{ env.DESTINATION_REPOSITORY }}
        destination_branch_create: add-or-update-python-linters
        use_rsync: true
        push_with_force: true
        source_files: ${{ env.SOURCE_FILES }}

    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.REPO_TOKEN }}
        repository: ${{ env.DESTINATION_USERNAME }}/${{ env.DESTINATION_REPOSITORY }}

    - name: Create pull request
      id: pull-request
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.REPO_TOKEN }}
        title: Add or update python linters
        body: |
          Update from https://$INPUT_GIT_SERVER/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}

          Auto-generated by [create-pull-request][1]. Template based on this [example][2], this
          [example][3], and this [example][4]

          [1]: https://github.com/peter-evans/create-pull-request
          [2]: https://stackoverflow.com/questions/58465057/trigger-a-github-action-when-another-repository-creates-a-new-release/58468828#58468828
          [3]: https://github.com/peter-evans/create-pull-request/blob/main/docs/examples.md#update-swaggerui-for-github-pages
          [4]: https://github.com/peter-evans/create-pull-request/blob/main/docs/concepts-guidelines.md#creating-pull-requests-in-a-remote-repository
        labels: automated pr
        assignees: dennisvtang
        branch: add-or-update-python-linters

    - name: Send email notification
      uses: dawidd6/action-send-mail@v3
      if: steps.pull-request.outputs.pull-request-operation == 'created' || steps.pull-request.outputs.pull-request-operation == 'updated'
      with:
        # Required mail server address if not connection_url:
        server_address: smtp.gmail.com
        # Server port, https://support.google.com/a/answer/176600?hl=en#:~:text=relay.gmail.com.-,Configuration,-options%20include%3A
        server_port: 465
        # Optional whether this connection use TLS (default is true if server_port is 465)
        secure: true
        # mail server username:
        username: ${{secrets.GOOGLE_EMAIL_USERNAME}}
        # mail server password:
        password: ${{secrets.GOOGLE_EMAIL_PASSWORD}}
        # Required mail subject:
        subject: "[${{ env.DESTINATION_USERNAME }}/${{ env.DESTINATION_REPOSITORY }}] Add or update python linters"
        # Required recipients' addresses:
        to: ${{secrets.GOOGLE_EMAIL_USERNAME}}
        # Required sender full name (address can be skipped):
        from: homelab@github.com
        # Optional plain body:
        html_body: |
          [${{ env.DESTINATION_REPOSITORY }} pull request](${{ steps.pull-request.outputs.pull-request-url }})
        convert_markdown: true