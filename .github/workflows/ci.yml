# THIS FILE IS GITHUB ACTION COPIED FROM https://github.com/tibtiq/python-linters
name: Linter

on:
  # allows manual trigger
  workflow_dispatch:
  # allows other workflows to call this workflow
  workflow_call:
  pull_request:

jobs:
  ruff-formatter-and-linter:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: formatter
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

      - name: linter
        uses: astral-sh/ruff-action@v3
        with:
          args: "check"
