# DO NOT MODIFY THIS FILE DIRECTLY, IT'LL BE ANNOYING
name: Linter

on:
  # allows manual trigger
  workflow_dispatch:
  pull_request:

jobs:
  python-lint:
    runs-on: ubuntu-latest
    name: CI workflow
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          cache: 'pip' # caching pip dependencies

      - name: Linter
        uses: juissi-t/python-lint-annotate@ff09bc6bdd47de544b00cf57a9921c636a829909
        with:
          python-root-list: "src/"
          extra-pylint-options: "--disable=W1202,W1203,C0116"
          extra-pycodestyle-options: "--config=.pycodestyle"
          use-vulture: false
          use-black: false
