name: Formatter and Linter

on:
  # allows other workflows to call this workflow
  workflow_call:

jobs:
  formatter-and-linter:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: formatter
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

      - name: linter
        uses: astral-sh/ruff-action@v3
        with:
          args: "check"
