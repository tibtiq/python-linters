name: Formatter and Linter

on:
  workflow_call: # allows other workflows to call this workflow

  push:
    branches: [ main ] # Only runs when code is merged/pushed directly to main
  pull_request:
    branches: [ main ] # Only runs when a PR targets the main branch

jobs:
  lock_file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv lock --locked

  tests:
    runs-on: ubuntu-latest
    needs: [lock_file]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Run Unit Tests
        run: uv run pytest -v --durations=0 --cov --cov-report=xml

      - name: Run Integration Tests (Dependabot PRs only)
        if: github.actor == 'dependabot[bot]'
        run: uv run pytest --run-integration -m integration